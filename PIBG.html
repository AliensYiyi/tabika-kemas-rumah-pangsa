<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buku Program PIBG | TABIKA KEMAS Rumah Pangsa</title>

  <style>
    :root {
      --primary: #4f8cff;
      --primary-dark: #2563eb;
      --secondary: #ffd166;
      --pink: #ff7eb6;
      --green: #7bd88f;
      --cream: #fff8e7;
      --white: #ffffff;
      --text: #24324b;
      --muted: #667085;
      --shadow: 0 18px 35px rgba(37, 99, 235, .16);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Comic Sans MS", "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 209, 102, .45), transparent 25%),
        radial-gradient(circle at 90% 15%, rgba(255, 126, 182, .35), transparent 28%),
        radial-gradient(circle at 20% 85%, rgba(123, 216, 143, .35), transparent 25%),
        linear-gradient(135deg, #eaf6ff 0%, #fff8e7 55%, #ffeef6 100%);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 25px rgba(79, 140, 255, .18);
      border-bottom: 4px solid var(--secondary);
    }

    .nav-container {
      width: 100%;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 25px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--primary-dark);
      font-size: 19px;
      font-weight: 900;
      white-space: nowrap;
    }

    .brand img {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      object-fit: cover;
      border: 4px solid var(--secondary);
      background: white;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      padding: 10px 14px;
      border-radius: 999px;
      transition: .25s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    #menu-check { display: none; }

    .menu-toggle {
      display: none;
      font-size: 32px;
      font-weight: 900;
      color: var(--primary-dark);
      cursor: pointer;
    }

    .page-content {
      flex: 1;
      max-width: 1180px;
      margin: 0 auto;
      width: 100%;
      padding: 45px 24px;
    }

    .page-head {
      text-align: center;
      margin-bottom: 35px;
    }

    .page-head h1 {
      font-size: clamp(32px, 5vw, 48px);
      margin-bottom: 12px;
    }

    .page-head p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }

    .pdf-container {
      background: rgba(255, 255, 255, 0.8);
      border: 4px solid white;
      border-radius: 36px;
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .pdf-iframe {
      width: 100%;
      height: 75vh;
      min-height: 500px;
      border-radius: 20px;
      border: 3px dashed rgba(79, 140, 255, 0.4);
      background: white;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-weight: 900;
      font-size: 16px;
      border-radius: 999px;
      box-shadow: 0 12px 24px rgba(79, 140, 255, 0.28);
      transition: 0.25s ease;
    }

    .btn-download:hover {
      transform: translateY(-4px) rotate(-1deg);
    }

    footer {
      text-align: center;
      color: var(--text);
      background: rgba(255,255,255,.72);
      padding: 35px 20px;
      border-top: 4px solid var(--secondary);
      font-weight: 700;
    }

    @media (max-width: 1050px) {
      .menu-toggle { display: block; }
      .nav-container { flex-wrap: wrap; }
      .nav-links {
        width: 100%;
        display: none;
        flex-direction: column;
        align-items: stretch;
        background: white;
        padding: 15px;
        border-radius: 22px;
        box-shadow: var(--shadow);
      }
      #menu-check:checked ~ .nav-links { display: flex; }
      .nav-links a { text-align: center; }
    }

    @media (max-width: 650px) {
      .nav-container, .page-content { padding-left: 16px; padding-right: 16px; }
      .brand { font-size: 15px; white-space: normal; line-height: 1.2; }
      .brand img { width: 44px; height: 44px; }
      .page-head h1 { font-size: 28px; }
      .pdf-container { padding: 14px; border-radius: 24px; }
      .pdf-iframe { height: 60vh; min-height: 400px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <div class="brand">
        <img src="https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?q=80&w=300&auto=format&fit=crop" alt="Logo Tabika">
        <span>TABIKA KEMAS Rumah Pangsa</span>
      </div>

      <input type="checkbox" id="menu-check" />
      <label for="menu-check" class="menu-toggle">☰</label>

      <nav class="nav-links">
        <a href="index.html">Utama</a>
        <a href="index.html#tentang">Tentang</a>
        <a href="program.html">Program</a>
        <a href="ajk.html">Guru & AJK</a>
        <a href="PIBG.html" class="active">Buku Program PIBG</a>
        <a href="galeri.html">Galeri</a>
        <a href="hubungi.html">Hubungi</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="page-head">
      <h1>📖 Buku Program PIBG</h1>
      <p>Sila baca atau muat turun buku program PIBG kami di bawah.</p>
    </div>

    <div class="pdf-container">
      <a href="pibg.pdf" target="_blank" class="btn-download">📥 Buka / Muat Turun PDF (Skrin Penuh)</a>
      <iframe src="pibg.pdf" class="pdf-iframe" title="Buku Program PIBG"></iframe>
    </div>
  </main>

  <footer>
    <p>© 2026 TABIKA KEMAS Rumah Pangsa. Pembelajaran Ceria Bermula Di Sini 🌟</p>
  </footer>

</body>
</html>
