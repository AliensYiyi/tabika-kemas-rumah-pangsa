<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buku Program PIBG | TABIKA KEMAS</title>

  <style>
    :root {
      --blue: #4f8cff;
      --blue-dark: #2563eb;
      --yellow: #ffd166;
      --text: #24324b;
      --muted: #667085;
      --bg: #f4f8ff;
      --white: #ffffff;
      --shadow: 0 18px 40px rgba(37, 99, 235, .16);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef6ff, #fff8e7);
      color: var(--text);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--blue);
      color: white;
      padding: 14px 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,.12);
    }

    .topbar-inner {
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 900;
    }

    .back-btn {
      text-decoration: none;
      background: var(--yellow);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(0,0,0,.12);
    }

    .header {
      text-align: center;
      padding: 36px 18px 22px;
    }

    .header h2 {
      font-size: clamp(32px, 7vw, 54px);
      margin-bottom: 10px;
      font-weight: 900;
    }

    .header p {
      color: var(--muted);
      font-size: clamp(16px, 4vw, 22px);
      line-height: 1.5;
      max-width: 720px;
      margin: auto;
    }

    .viewer-wrapper {
      width: min(100%, 980px);
      margin: 0 auto 40px;
      padding: 0 14px;
    }

    .controls {
      position: sticky;
      top: 72px;
      z-index: 9;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(79, 140, 255, .18);
      border-radius: 22px;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .controls button,
    .download-btn {
      border: none;
      cursor: pointer;
      background: var(--blue);
      color: white;
      padding: 11px 16px;
      border-radius: 999px;
      font-weight: 900;
      text-decoration: none;
      font-size: 15px;
    }

    .controls button:disabled {
      background: #b7c7e8;
      cursor: not-allowed;
    }

    .page-info {
      font-weight: 900;
      color: var(--text);
      background: #eef4ff;
      padding: 10px 14px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .pdf-card {
      background: white;
      border-radius: 24px;
      padding: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    #pdf-canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px;
      background: white;
    }

    .loading {
      text-align: center;
      padding: 30px;
      color: var(--muted);
      font-weight: 700;
    }

    @media (max-width: 650px) {
      .topbar-inner {
        justify-content: center;
        text-align: center;
      }

      .controls {
        top: 88px;
        flex-wrap: wrap;
        border-radius: 18px;
      }

      .controls button,
      .download-btn,
      .page-info {
        font-size: 14px;
        padding: 10px 13px;
      }

      .pdf-card {
        border-radius: 18px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <div class="topbar-inner">
      <h1>📘 Buku Program PIBG</h1>
      <a href="index.html" class="back-btn">⬅ Kembali</a>
    </div>
  </nav>

  <section class="header">
    <h2>Mesyuarat PIBG</h2>
    <p>Sila lihat buku program rasmi TABIKA KEMAS Rumah Pangsa di bawah.</p>
  </section>

  <main class="viewer-wrapper">
    <div class="controls">
      <button id="prev-page">⬅ Back</button>
      <span class="page-info">Page <span id="page-num">1</span> / <span id="page-count">?</span></span>
      <button id="next-page">Next ➡</button>
      <a href="PIBG.pdf" class="download-btn" download>Download</a>
    </div>

    <div class="pdf-card">
      <p class="loading" id="loading">Loading PDF...</p>
      <canvas id="pdf-canvas"></canvas>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    const pdfUrl = "PIBG.pdf";

    const canvas = document.getElementById("pdf-canvas");
    const ctx = canvas.getContext("2d");
    const pageNumText = document.getElementById("page-num");
    const pageCountText = document.getElementById("page-count");
    const prevBtn = document.getElementById("prev-page");
    const nextBtn = document.getElementById("next-page");
    const loading = document.getElementById("loading");

    let pdfDoc = null;
    let pageNum = 1;
    let rendering = false;
    let pendingPage = null;

    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    function renderPage(num) {
      rendering = true;
      loading.style.display = "block";

      pdfDoc.getPage(num).then(page => {
        const containerWidth = document.querySelector(".pdf-card").clientWidth - 24;
        const viewport = page.getViewport({ scale: 1 });
        const scale = containerWidth / viewport.width;
        const scaledViewport = page.getViewport({ scale: scale });

        canvas.width = scaledViewport.width;
        canvas.height = scaledViewport.height;

        const renderContext = {
          canvasContext: ctx,
          viewport: scaledViewport
        };

        page.render(renderContext).promise.then(() => {
          rendering = false;
          loading.style.display = "none";

          if (pendingPage !== null) {
            renderPage(pendingPage);
            pendingPage = null;
          }
        });
      });

      pageNumText.textContent = num;
      prevBtn.disabled = num <= 1;
      nextBtn.disabled = num >= pdfDoc.numPages;
    }

    function queueRenderPage(num) {
      if (rendering) {
        pendingPage = num;
      } else {
        renderPage(num);
      }
    }

    prevBtn.addEventListener("click", () => {
      if (pageNum <= 1) return;
      pageNum--;
      queueRenderPage(pageNum);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    nextBtn.addEventListener("click", () => {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++;
      queueRenderPage(pageNum);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    window.addEventListener("resize", () => {
      if (pdfDoc) queueRenderPage(pageNum);
    });

    pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
      pdfDoc = pdf;
      pageCountText.textContent = pdf.numPages;
      renderPage(pageNum);
    }).catch(error => {
      loading.textContent = "PDF not found. Make sure your file name is exactly PIBG.pdf and uploaded in the same folder as this page.";
      console.error(error);
    });
  </script>

</body>
</html>
